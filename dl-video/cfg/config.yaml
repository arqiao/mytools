  #   title: ""                       # 可选，手动指定标题（留空则自动获取）

# srt_fix 校订配置
srt_fix:
  prompt: "prompt-srtfix-ref.md"
  prompt_noref: "prompt-srtfix-noref.md"
  chunk_size: 80
  custom_dict: "srtfix-dict.yaml"

# addon 信息拓展配置
addon:
  chunk_size: 30000
  prompt_subtitle: "prompt-subtitle.md"
  prompt_discussion: "prompt-discussion.md"
  prompt_digest: "prompt-digest.md"

llm:
  provider: "minimax"
  minimax:
    model: "MiniMax-Text-01"
    base_url: "https://api.minimax.chat/v1"
    max_tokens: 8192
    temperature: 0.3
  volcengine:
    model: "doubao-1.5-pro-256k"
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
    max_tokens: 8192
    temperature: 0.2
  dashscope:
    model: "qwen-max"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    max_tokens: 8192
    temperature: 0.2
  deepseek:
    model: "deepseek-chat"
    base_url: "https://api.deepseek.com/v1"
    max_tokens: 8192
    temperature: 0.2

