output_dir: "output"

# 各步骤输入配置
input:
  s3:
    source_type: ""    # 视频源类型
    source_url: ""      # 视频源 URL
  s4:
    subtitle: ""
    transcript: ""
  s5:
    transcript: ""
    subtitle: ""
    discussion: ""

# 各步骤输出配置
output:
  s3:
    dir: "output"
  s4:
    dir: "output"
    suffix: "_fix"
  s5:
    dir: "output"
    prefix: ""

# 字幕引擎后缀映射（引擎名 → 文件名后缀）
s3_engine_suffix:
  xunfei: "_xunfei"
  aliyun: "_aliyun"
  doubao: "_doubao"
  feishu: "_feishu"
  tencent: "_tencent"
  whisper_large: "_wl"
  whisper_medium: "_wm"
  whisper_small: "_ws"
  whisper_tiny: "_wt"

s4_fix:
  prompt: "prompt-srtfix-ref.md"
  prompt_noref: "prompt-srtfix-noref.md"
  chunk_size: 80
  custom_dict: "srtfix-dict.yaml"

s5_analysis:
  chunk_size: 30000
  prompt_subtitle: "prompt-subtitle.md"
  prompt_discussion: "prompt-discussion.md"
  prompt_digest: "prompt-digest.md"


# LLM 模型配置池（所有可用模型定义）
llm_plan:
  # 各步骤当前使用的模型
  current_s4:
    name: "minimax"
    temperature: 0.2
  current_s5:
    name: "minimax"
    temperature: 0.3
  # LLM 模型调用接口
  minimax:
    model: "MiniMax-Text-01"
    base_url: "https://api.minimax.chat/v1"
    max_tokens: 8192
  volcengine:
    model: "doubao-1.5-pro-256k"
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
    max_tokens: 8192
  dashscope:
    model: "qwen-max"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    max_tokens: 8192
  deepseek:
    model: "deepseek-chat"
    base_url: "https://api.deepseek.com/v1"
    max_tokens: 8192
