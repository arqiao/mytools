output_dir: "output"

whisper:
  model: "medium"
  force_cpu: false

# 字幕引擎后缀映射（引擎名 → 文件名后缀）
engine_suffix:
  xunfei: "_xunfei"
  aliyun: "_aliyun"
  doubao: "_doubao"
  feishu: "_feishu"
  tencent: "_tencent"
  whisper_large: "_wl"
  whisper_medium: "_wm"
  whisper_small: "_ws"
  whisper_tiny: "_wt"

# 回放任务列表 — 支持多种视频源
tasks:
